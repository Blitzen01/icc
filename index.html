<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imus Computer College</title>
    <link rel="shortcut icon" href="assets/images/logo.png" type="image/x-icon">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.5/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/3.0.2/css/responsive.bootstrap5.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Content Sections -->
    <div id="hero"></div>
    <div id="featured"></div>
    <div id="programs"></div>
    <div id="post"></div>
    <div id="credits"></div>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Scripts -->
    <div id="scripts"></div>

    <script>
        function loadComponent(id, file) {
            fetch(file)
                .then(response => response.text())
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                })
                .catch(error => console.error('Error loading:', file));
        }

        loadComponent("navbar", "includes/navbar.html");
        loadComponent("hero", "pages/hero.html");
        loadComponent("featured", "pages/featured.html");
        loadComponent("programs", "pages/programs.html");
        loadComponent("post", "pages/post.html");
        loadComponent("credits", "pages/credits.html");
        loadComponent("footer", "includes/footer.html");
        loadComponent("scripts", "includes/scripts.html");
    </script>

</body>
</html>
